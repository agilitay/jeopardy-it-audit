<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IT Audit Jeopardy – Buzzer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a1628; color: #fff;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 1.5rem; text-align: center; user-select: none; }
  #setup { width: 100%; max-width: 360px; }
  #setup h1 { font-size: 24px; font-weight: 700; margin-bottom: 0.4rem; }
  #setup p { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; }
  select { width: 100%; padding: 12px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; margin-bottom: 1rem; }
  select option { background: #1a2a40; }
  .btn-join { width: 100%; padding: 14px; background: #185FA5; color: #fff; border: none;
    border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
  .btn-join:hover { background: #0C447C; }
  #buzzer { display: none; flex-direction: column; align-items: center; gap: 1.5rem; width: 100%; max-width: 360px; }
  .group-display { font-size: 26px; font-weight: 700; }
  .buzz-btn { width: 200px; height: 200px; border-radius: 50%;
    background: #185FA5; border: 5px solid rgba(255,255,255,0.25);
    color: #fff; font-size: 22px; font-weight: 800; letter-spacing: 2px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 6px; transition: transform 0.1s, background 0.15s;
    -webkit-tap-highlight-color: transparent; box-shadow: 0 6px 24px rgba(24,95,165,0.5); }
  .buzz-btn:active { transform: scale(0.92); }
  .buzz-btn.success { background: #3B6D11; }
  .buzz-btn.locked { background: #444; cursor: default; }
  .buzz-icon { font-size: 32px; }
  .status-msg { font-size: 14px; color: rgba(255,255,255,0.6); min-height: 20px; }
  .status-msg.good { color: #81c784; }
  .status-msg.bad { color: #e57373; }
</style>
</head>
<body>

<div id="setup">
  <h1>⚡ Buzzer</h1>
  <p>IT Audit Jeopardy</p>
  <select id="group-select">
    <option value="">-- Select your group --</option>
    <option value="G1">Group 1</option><option value="G2">Group 2</option>
    <option value="G3">Group 3</option><option value="G4">Group 4</option>
    <option value="G5">Group 5</option><option value="G6">Group 6</option>
    <option value="G7">Group 7</option><option value="G8">Group 8</option>
    <option value="G9">Group 9</option><option value="G10">Group 10</option>
    <option value="G11">Group 11</option><option value="G12">Group 12</option>
  </select>
  <button class="btn-join" onclick="joinGame()">Join Game</button>
</div>

<div id="buzzer">
  <div class="group-display" id="group-display"></div>
  <button class="buzz-btn" id="buzz-btn" onclick="buzz()">
    <span class="buzz-icon">🔔</span>
    <span>BUZZ!</span>
  </button>
  <div class="status-msg" id="status-msg">Ready — tap to buzz in!</div>
</div>

<script>
const NTFY_TOPIC = 'jeopardy-itaudit-agilitay-room1';
const NTFY_URL   = 'https://ntfy.sh/' + NTFY_TOPIC;

let myGroup = '';
let locked = false;

function joinGame() {
  const grp = document.getElementById('group-select').value;
  if (!grp) { alert('Please select your group number.'); return; }
  myGroup = grp;
  document.getElementById('setup').style.display = 'none';
  const buz = document.getElementById('buzzer');
  buz.style.display = 'flex';
  document.getElementById('group-display').textContent = grp.replace('G','Group ');
  startResetListener();
}

function startResetListener() {
  const es = new EventSource(NTFY_URL + '/sse');
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      const msg = data.message || '';
      if (msg === 'RESET') unlockBuzzer();
    } catch(_) {}
  };
}

function unlockBuzzer() {
  locked = false;
  const btn = document.getElementById('buzz-btn');
  btn.className = 'buzz-btn';
  const msg = document.getElementById('status-msg');
  msg.textContent = 'Ready — tap to buzz in!';
  msg.className = 'status-msg';
}

async function buzz() {
  if (locked) return;
  locked = true;
  const btn = document.getElementById('buzz-btn');
  const msg = document.getElementById('status-msg');
  btn.className = 'buzz-btn success';
  msg.textContent = 'Sending buzz...';
  msg.className = 'status-msg';

  try {
    const res = await fetch(NTFY_URL, {
      method: 'POST',
      body: 'BUZZ:' + myGroup,
      headers: { 'Content-Type': 'text/plain' }
    });
    if (res.ok) {
      msg.textContent = '✓ Buzzed in!';
      msg.className = 'status-msg good';
      btn.className = 'buzz-btn locked';
      setTimeout(() => {
        msg.textContent = 'Waiting for teacher...';
        msg.className = 'status-msg';
      }, 1500);
    } else {
      throw new Error('Server error ' + res.status);
    }
  } catch(e) {
    msg.textContent = 'Error: ' + e.message + ' — try again';
    msg.className = 'status-msg bad';
    locked = false;
    btn.className = 'buzz-btn';
  }
}
</script>
</body>
</html>
